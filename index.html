<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wifey</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- html2canvas and JSZip for Exporting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: scale(1) translate(-50%, -50%); }
            50% { opacity: 0.6; transform: scale(1.1) translate(-50%, -50%); }
        }
        @keyframes gradientPan {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        /* Smooth glowing header heart (No beating/scaling) */
        @keyframes headerPulseGlow {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(251,146,60,0.4)); }
            50% { filter: drop-shadow(0 0 15px rgba(251,146,60,1)); }
        }

        /* Larger glowing heart for Splash Screen */
        @keyframes splashPulseGlow {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(251,146,60,0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(251,146,60,1)); }
        }

        /* PRINTING PRESS EFFECTS */
        @keyframes printShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-1px, 1px) rotate(-0.5deg); }
            50% { transform: translate(1px, -1px) rotate(0.5deg); }
            75% { transform: translate(-1px, -1px) rotate(0deg); }
        }
        @keyframes scanDown {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; height: 4px; box-shadow: 0 0 30px 5px rgba(255,255,255,0.8); }
            90% { opacity: 1; height: 4px; box-shadow: 0 0 30px 5px rgba(255,255,255,0.8); }
            100% { top: 100%; opacity: 0; }
        }

        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-header-pulse { animation: headerPulseGlow 3s ease-in-out infinite; }
        .animate-splash-pulse { animation: splashPulseGlow 3s ease-in-out infinite; }
        .animate-print-shake { animation: printShake 0.15s infinite; }
        
        .print-scanner {
            position: absolute;
            left: 0; right: 0;
            background: #ffffff;
            z-index: 50;
            animation: scanDown 0.8s linear forwards;
            pointer-events: none;
        }

        .bg-gradient-pan {
            background-size: 200% 200%;
            animation: gradientPan 8s ease infinite;
        }

        @keyframes driftRight {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(120vw); }
        }
        @keyframes driftLeft {
            0% { transform: translateX(120vw); }
            100% { transform: translateX(-120%); }
        }
        
        .cloud {
            position: absolute;
            max-width: none;
            will-change: transform;
            filter: brightness(0.75) contrast(1.1); 
        }
        
        .animate-cloud-fast { animation: driftRight 45s linear infinite; }
        .animate-cloud-med { animation: driftRight 70s linear infinite; }
        .animate-cloud-med-slow { animation: driftLeft 90s linear infinite; }
        .animate-cloud-slow { animation: driftRight 130s linear infinite; }

        .fix-cursive-clip {
            text-shadow: 0px 10px 10px rgba(0,0,0,0.01);
            padding-bottom: 20px;
        }

        /* Editor specific strict rules */
        .ig-editor { font-family: 'Inter', sans-serif; }
        .ig-editor[data-placeholder]:empty:before {
            content: attr(data-placeholder);
            color: #525252;
            cursor: text;
        }
        
        /* Font size mappings */
        .ig-editor font[size="7"] { font-size: 2.5rem; line-height: 1.1; font-weight: bold; }
        .ig-editor font[size="6"] { font-size: 2rem; line-height: 1.2; font-weight: bold; }
        .ig-editor font[size="5"] { font-size: 1.5rem; line-height: 1.3; font-weight: bold; }
        .ig-editor font[size="4"] { font-size: 1.25rem; line-height: 1.4; font-weight: 500; }
        .ig-editor font[size="3"] { font-size: 1rem; line-height: 1.5; }
        .ig-editor font[size="2"] { font-size: 0.875rem; line-height: 1.5; }
        .ig-editor font[size="1"] { font-size: 0.75rem; line-height: 1.5; }
        
        /* Strict element control inside the canvas */
        .ig-editor p, .ig-editor div { margin-bottom: 0.75em; max-width: 100% !important; }
        .ig-editor:focus { outline: none; }
        
        /* Scrollbar hiding & Rigid Layout */
        .ig-editor::-webkit-scrollbar { display: none !important; }
        .ig-editor {
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
            overflow: hidden !important; 
            overflow-x: hidden !important;
            overflow-y: hidden !important;
            overflow-wrap: anywhere !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
        }
        .ig-editor * {
            max-width: 100% !important;
            overflow-wrap: anywhere !important;
            word-wrap: break-word !important;
        }

        /* Inset shadow for lever track */
        .inset-inner-shadow { box-shadow: inset 0 10px 20px rgba(0,0,0,0.8); }
    </style>
</head>
<body class="bg-neutral-950 text-white font-sans w-full h-screen flex flex-col overflow-hidden relative">

    <!-- PLACES MODE BACKGROUND -->
    <div id="places-bg-container" class="fixed inset-0 z-0 opacity-0 pointer-events-none transition-opacity duration-1000">
        <div id="places-bg" class="absolute inset-0 bg-cover bg-center scale-110 transition-all duration-300" style="background-image: url('https://i.imgur.com/5UFzerv.jpeg'); filter: blur(8px);"></div>
        <div class="absolute inset-0 bg-black/50"></div>
    </div>

    <!-- WEATHER CANVAS LAYER -->
    <canvas id="weather-canvas" class="fixed inset-0 z-0 pointer-events-none opacity-0 transition-opacity duration-1000"></canvas>

    <!-- CLOUDS PARALLAX LAYER -->
    <div id="clouds-container" class="fixed inset-0 z-0 pointer-events-none opacity-0 transition-opacity duration-1000 overflow-hidden">
        <img src="https://i.postimg.cc/W4p8vFpr/6.png" class="cloud animate-cloud-fast w-[150vw] md:w-[130vw] top-[-15vh] opacity-90 left-0" style="animation-delay: -20s;" alt="Cloud">
        <img src="https://i.postimg.cc/mrZjszZD/1.png" class="cloud animate-cloud-med w-[110vw] md:w-[90vw] top-[-5vh] opacity-80 left-0" style="animation-delay: -45s;" alt="Cloud">
        <img src="https://i.postimg.cc/mrZjszZb/2.png" class="cloud animate-cloud-med-slow w-[80vw] md:w-[60vw] top-[5vh] opacity-70 left-0" style="animation-delay: -10s;" alt="Cloud">
        <img src="https://i.postimg.cc/mrZjszZb/2.png" class="cloud animate-cloud-med w-[75vw] md:w-[55vw] top-[18vh] opacity-65 left-0" style="animation-delay: -55s;" alt="Cloud">
        <img src="https://i.postimg.cc/Jh7xLD78/4.png" class="cloud animate-cloud-slow w-[50vw] md:w-[35vw] top-[2vh] opacity-40 left-0" style="animation-delay: -5s;" alt="Cloud">
        <img src="https://i.postimg.cc/Jh7xLD78/4.png" class="cloud animate-cloud-slow w-[55vw] md:w-[40vw] top-[22vh] opacity-45 left-0" style="animation-delay: -80s;" alt="Cloud">
    </div>

    <!-- PRINTING PRESS LEVER OVERLAY -->
    <div id="lever-modal" class="fixed inset-0 z-[100] hidden flex-col items-center justify-center bg-black/85 backdrop-blur-md transition-opacity duration-500 opacity-0 select-none">
        <div class="text-center mb-12 animate-float">
            <h2 class="text-4xl md:text-5xl font-bold text-white mb-3" style="font-family: 'Playfair Display', serif;">The Printing Press</h2>
            <p class="text-neutral-400 font-mono tracking-widest uppercase text-sm">Pull lever to mint your story</p>
        </div>
        
        <!-- The Machine -->
        <div class="relative w-24 h-64 bg-neutral-900 border-4 border-neutral-700 rounded-3xl shadow-[0_0_50px_rgba(0,0,0,0.8)] flex justify-center p-2 mb-10">
            <!-- The Track -->
            <div class="w-4 h-full bg-black rounded-full inset-inner-shadow relative">
                <!-- The Handle -->
                <div id="lever-handle" class="absolute top-0 left-1/2 -translate-x-1/2 w-20 h-20 bg-gradient-to-b from-rose-500 to-rose-700 rounded-full cursor-pointer shadow-[0_10px_20px_rgba(225,29,72,0.4)] border-b-[6px] border-rose-900 flex items-center justify-center hover:brightness-110 active:cursor-grabbing transform transition-transform" style="touch-action: none;">
                    <div class="w-10 h-10 rounded-full bg-rose-400/30"></div>
                </div>
            </div>
        </div>
        
        <button id="btn-cancel-print" class="px-6 py-2 rounded-full border border-neutral-700 text-neutral-400 hover:text-white hover:bg-neutral-800 transition-colors">Abort Sequence</button>
    </div>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-gradient-to-br from-[#3b2314] to-[#1a0f09] overflow-hidden transition-opacity duration-700">
        <div class="absolute top-1/2 left-1/4 w-[500px] h-[500px] bg-orange-600/20 rounded-full blur-[100px] animate-breathe"></div>
        <div class="absolute top-1/2 left-3/4 w-[500px] h-[500px] bg-amber-600/20 rounded-full blur-[100px] animate-breathe" style="animation-delay: -4s;"></div>
        
        <div class="z-10 flex flex-col items-center text-center px-4 max-w-2xl animate-float">
            <div class="bg-[#5c341e]/40 backdrop-blur-md border border-[#8a4e2d] p-6 rounded-3xl mb-8 shadow-2xl flex items-center justify-center">
                <!-- Glowing splash heart icon -->
                <i class="ph-fill ph-heart text-5xl text-orange-400 animate-splash-pulse"></i>
            </div>
            
            <h1 class="mb-12 flex flex-col items-center">
                <!-- Wifey! Logo -->
                <span class="text-7xl md:text-9xl bg-clip-text text-transparent bg-gradient-to-r from-orange-400 via-amber-300 to-rose-400 bg-gradient-pan drop-shadow-sm fix-cursive-clip pb-6 block" style="font-family: 'Pacifico', cursive; line-height: 1.5; padding-bottom: 24px;">
                    Wifey!
                </span>
            </h1>
            
            <button id="btn-start" class="group relative inline-flex items-center justify-center gap-3 px-8 py-4 bg-[#e76f51] text-white font-bold rounded-full text-lg transition-all duration-300 hover:scale-105 hover:bg-[#f4a261] hover:text-[#2b1810] hover:shadow-[0_0_40px_rgba(231,111,81,0.5)] active:scale-95 overflow-hidden border border-[#f4a261]/50">
                <span class="relative z-10 flex items-center gap-2">
                    Start Writing
                    <i class="ph-bold ph-arrow-right group-hover:translate-x-1 transition-transform"></i>
                </span>
                <div class="absolute inset-0 -translate-x-full bg-gradient-to-r from-transparent via-white/30 to-transparent group-hover:animate-[shimmer_1.5s_infinite]"></div>
            </button>
        </div>

        <div class="absolute bottom-4 text-[#8a4e2d]/60 text-xs font-mono tracking-widest z-10 pointer-events-none select-none">v1.1</div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="main-app" class="hidden flex-col h-full w-full relative z-10 transition-transform">
        
        <!-- Header -->
        <header class="flex items-center justify-between p-4 bg-neutral-900/80 backdrop-blur-md border-b border-neutral-800 shrink-0 z-20 transition-colors duration-500" id="main-header">
            <div class="flex items-center gap-3">
                <i class="ph-fill ph-heart text-orange-400 text-2xl animate-header-pulse"></i>
                <h1 class="text-xl font-bold tracking-tight text-white hidden md:block" style="font-family: 'Pacifico', cursive;">Wifey!</h1>
            </div>
            <div class="flex items-center gap-2 md:gap-4 flex-wrap">
                
                <div id="places-controls" class="hidden items-center gap-2 bg-neutral-950/60 px-3 py-1.5 rounded-full border border-neutral-700 backdrop-blur-sm mr-2 transition-all duration-300">
                    <button id="btn-places-shuffle" class="text-neutral-400 hover:text-white transition-colors flex items-center justify-center p-1" title="Randomize Place">
                        <i class="ph ph-shuffle text-lg"></i>
                    </button>
                    <div class="w-px h-5 bg-neutral-700 mx-1"></div>
                    <i class="ph ph-aperture text-neutral-400" title="Focus Knob"></i>
                    <input type="range" id="focus-slider" min="0" max="20" value="8" class="w-16 md:w-20 accent-blue-500 cursor-pointer" title="Adjust Background Blur">
                    <div class="w-px h-5 bg-neutral-700 mx-1"></div>
                    <i class="ph ph-magnifying-glass-plus text-neutral-400" title="Zoom Knob"></i>
                    <input type="range" id="zoom-slider" min="100" max="150" value="110" class="w-16 md:w-20 accent-blue-500 cursor-pointer" title="Adjust Background Zoom">
                </div>
                
                <button id="btn-places" class="flex items-center gap-2 text-sm text-neutral-400 hover:text-white transition-colors">
                    <i class="ph ph-image text-lg"></i> <span class="hidden md:inline">Places</span>
                </button>
                
                <div class="w-px h-6 bg-neutral-700 mx-1"></div>
                
                <button id="btn-theme" class="flex items-center gap-2 text-sm text-neutral-400 hover:text-white transition-colors">
                    <i class="ph ph-sun text-lg"></i> <span class="hidden md:inline">Theme</span>
                </button>

                <div class="w-px h-6 bg-neutral-700 mx-1"></div>

                <button id="btn-weather" class="flex items-center gap-2 text-sm text-neutral-400 hover:text-white transition-colors" title="Toggle Weather">
                    <i class="ph ph-cloud-rain text-lg"></i> <span class="hidden md:inline">Weather</span>
                </button>

                <div class="w-px h-6 bg-neutral-700 mx-1"></div>
                
                <button id="btn-dictionary" class="flex items-center gap-2 text-sm text-neutral-400 hover:text-white transition-colors">
                    <i class="ph ph-book-open-text text-lg"></i> <span class="hidden md:inline">Dictionary</span>
                </button>

                <div class="w-px h-6 bg-neutral-700 mx-1 hidden md:block"></div>

                <button id="btn-hardcore" class="flex items-center gap-2 text-sm text-rose-500 hover:text-rose-400 transition-colors" title="Coming Soon!">
                    <i class="ph-fill ph-lightning text-lg drop-shadow-[0_0_5px_rgba(244,63,94,0.5)]"></i> <span class="hidden md:inline font-semibold">Hardcore Mode</span>
                </button>

                <!-- EXPORT BUTTON -->
                <button id="btn-export" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-3 md:px-4 py-2 rounded-lg font-medium transition-colors ml-2">
                    <i class="ph ph-printer text-lg"></i> <span class="hidden md:inline">Export (ZIP)</span>
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col items-center py-6 px-4 gap-6 overflow-y-auto relative z-10">
            <!-- Floating Toolbar -->
            <div id="toolbar" class="hidden flex-wrap items-center justify-center gap-1 p-2 bg-neutral-900/95 backdrop-blur border border-neutral-700 rounded-xl shadow-2xl sticky top-2 z-30 transition-all duration-500 max-w-full">
                <div class="relative">
                    <button id="btn-font-menu" onmousedown="event.preventDefault()" class="flex items-center gap-1 px-3 py-1.5 text-sm font-medium text-neutral-300 hover:bg-neutral-800 hover:text-white rounded-lg transition-colors border border-neutral-700 bg-neutral-950">
                        Fonts <i class="ph ph-caret-down"></i>
                    </button>
                    <div id="font-menu" class="hidden absolute top-full left-0 mt-2 w-56 bg-neutral-800 border border-neutral-700 rounded-lg shadow-xl py-2 z-50 flex flex-col max-h-64 overflow-y-auto">
                        <div class="px-3 pb-2 mb-2 border-b border-neutral-700 text-xs font-bold text-neutral-500 uppercase tracking-wider">Select Font</div>
                        <button onmousedown="event.preventDefault(); applyFont('Inter')" class="px-4 py-2 text-left text-neutral-200 hover:bg-neutral-700 hover:text-white w-full transition-colors" style="font-family: 'Inter'">Inter (Clean Sans)</button>
                        <button onmousedown="event.preventDefault(); applyFont('Playfair Display')" class="px-4 py-2 text-left text-neutral-200 hover:bg-neutral-700 hover:text-white w-full transition-colors" style="font-family: 'Playfair Display'">Playfair (Elegant Serif)</button>
                        <button onmousedown="event.preventDefault(); applyFont('Merriweather')" class="px-4 py-2 text-left text-neutral-200 hover:bg-neutral-700 hover:text-white w-full transition-colors" style="font-family: 'Merriweather'">Merriweather (Book Serif)</button>
                        <button onmousedown="event.preventDefault(); applyFont('Lora')" class="px-4 py-2 text-left text-neutral-200 hover:bg-neutral-700 hover:text-white w-full transition-colors" style="font-family: 'Lora'">Lora (Storyteller)</button>
                        <button onmousedown="event.preventDefault(); applyFont('Montserrat')" class="px-4 py-2 text-left text-neutral-200 hover:bg-neutral-700 hover:text-white w-full transition-colors" style="font-family: 'Montserrat'">Montserrat (Modern)</button>
                        <button onmousedown="event.preventDefault(); applyFont('Courier Prime')" class="px-4 py-2 text-left text-neutral-200 hover:bg-neutral-700 hover:text-white w-full transition-colors" style="font-family: 'Courier Prime'">Courier (Typewriter)</button>
                    </div>
                </div>

                <div class="w-px h-6 bg-neutral-700 mx-1"></div>

                <div class="flex items-center gap-1 bg-neutral-800 p-1 rounded-lg">
                    <button onmousedown="event.preventDefault(); applySize('7')" class="px-2 py-1 text-xs font-bold text-neutral-300 hover:bg-neutral-700 hover:text-white rounded" title="Massive Title">Title</button>
                    <button onmousedown="event.preventDefault(); applySize('5')" class="px-2 py-1 text-xs font-bold text-neutral-300 hover:bg-neutral-700 hover:text-white rounded" title="Heading">Heading</button>
                    <button onmousedown="event.preventDefault(); applySize('3')" class="px-2 py-1 text-xs text-neutral-300 hover:bg-neutral-700 hover:text-white rounded" title="Normal Body">Body</button>
                    <button onmousedown="event.preventDefault(); applySize('1')" class="px-2 py-1 text-xs text-neutral-400 hover:bg-neutral-700 hover:text-white rounded" title="Small Caption">Small</button>
                </div>
                
                <div class="w-px h-6 bg-neutral-700 mx-1"></div>
                
                <button onmousedown="event.preventDefault(); applyCommand('bold')" class="p-2 text-neutral-400 hover:text-white hover:bg-neutral-800 rounded-md"><i class="ph ph-text-b"></i></button>
                <button onmousedown="event.preventDefault(); applyCommand('italic')" class="p-2 text-neutral-400 hover:text-white hover:bg-neutral-800 rounded-md"><i class="ph ph-text-italic"></i></button>
                <button onmousedown="event.preventDefault(); applyCommand('underline')" class="p-2 text-neutral-400 hover:text-white hover:bg-neutral-800 rounded-md"><i class="ph ph-text-underline"></i></button>
                
                <div class="w-px h-6 bg-neutral-700 mx-1"></div>
                
                <button onmousedown="event.preventDefault(); applyCommand('justifyLeft')" class="p-2 text-neutral-400 hover:text-white hover:bg-neutral-800 rounded-md"><i class="ph ph-text-align-left"></i></button>
                <button onmousedown="event.preventDefault(); applyCommand('justifyCenter')" class="p-2 text-neutral-400 hover:text-white hover:bg-neutral-800 rounded-md"><i class="ph ph-text-align-center"></i></button>
                <button onmousedown="event.preventDefault(); applyCommand('justifyRight')" class="p-2 text-neutral-400 hover:text-white hover:bg-neutral-800 rounded-md"><i class="ph ph-text-align-right"></i></button>
            </div>

            <!-- Canvas Area (4:5 Aspect Ratio for IG) -->
            <div class="relative w-full max-w-[400px] flex-shrink-0 group z-10 mt-2">
                <div id="canvas-container" class="w-full aspect-[4/5] rounded-lg overflow-hidden flex flex-col transition-all duration-700 bg-[#121212] text-white shadow-2xl relative border border-neutral-800">
                    
                    <div id="cover-view" class="w-full h-full flex flex-col items-center justify-center relative bg-neutral-900/80">
                        <img id="cover-image-preview" src="" alt="Cover" class="hidden w-full h-full object-cover">
                        <label title="Upload Book Cover - Supported files: JPG, PNG. Dimensions: 1080 x 1350px exactly" id="cover-upload-label" class="cursor-pointer flex flex-col items-center justify-center gap-4 w-full h-full hover:bg-white/5 transition-colors border-2 border-dashed border-neutral-700 hover:border-blue-500 p-8 text-center absolute inset-0">
                            <div class="p-4 bg-neutral-800 rounded-full text-blue-400">
                                <i class="ph ph-image text-4xl"></i>
                            </div>
                            <div>
                                <p class="font-bold text-lg mb-1">Upload Book Cover</p>
                                <p class="text-xs text-neutral-400 bg-neutral-800 px-4 py-1.5 rounded-full inline-block mt-2">4:5 Ratio • JPG/PNG • 1080 x 1350px exactly</p>
                            </div>
                            <input type="file" id="cover-upload-input" accept="image/jpeg, image/png" class="hidden">
                        </label>
                    </div>

                    <div id="text-view" class="hidden w-full h-full p-8 relative overflow-hidden">
                        <div id="editor" contenteditable="true" data-placeholder="Start typing your story here..." class="ig-editor w-full h-full outline-none whitespace-pre-wrap break-words"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bg-neutral-900/80 backdrop-blur-md border-t border-neutral-800 p-4 shrink-0 flex flex-col items-center gap-4 z-20 transition-colors duration-500" id="main-footer">
            <div class="flex flex-col md:flex-row items-center gap-6">
                
                <div class="text-xs text-neutral-400 flex flex-col items-center md:items-end w-48">
                    <!-- 1200 CHAR LIMIT VISUAL -->
                    <span id="char-count" class="font-bold text-neutral-200 transition-colors">0 / 1200 Chars</span>
                    <span class="opacity-70 text-blue-400 font-medium">Current Slide Capacity</span>
                </div>

                <div class="flex items-center gap-2 md:gap-4 bg-neutral-950 p-2 rounded-full border border-neutral-800 shadow-inner">
                    <button id="btn-prev" class="p-2 text-neutral-400 hover:text-white disabled:opacity-30 disabled:hover:text-neutral-400 transition-colors">
                        <i class="ph ph-caret-left text-xl"></i>
                    </button>
                    
                    <span id="page-indicator" class="text-sm font-medium w-24 md:w-32 text-center text-white">Cover Slide</span>
                    
                    <button id="btn-next" class="p-2 text-neutral-400 hover:text-white disabled:opacity-30 disabled:hover:text-neutral-400 transition-colors">
                        <i class="ph ph-caret-right text-xl"></i>
                    </button>

                    <div class="w-px h-6 bg-neutral-700 mx-1"></div>

                    <button id="btn-add" class="p-2 text-blue-400 hover:text-blue-300 disabled:opacity-30 disabled:hover:text-blue-400 transition-colors flex items-center gap-1 text-sm font-medium pr-2 md:pr-4">

        const MAX_CHARS = 1200;

        const placesImages = [
            "https://i.imgur.com/5UFzerv.jpeg", "https://i.imgur.com/XCuiczb.jpeg", "https://i.imgur.com/6uJQCOC.jpeg",

        function setRandomPlace() {
            if (placesImages.length === 0) return;
            const randomIndex = Math.floor(Math.random() * placesImages.length);
            const imgUrl = placesImages[randomIndex];
            
            const tempImg = new Image();
            tempImg.onload = () => {
                if (tempImg.width === 161) {
                    placesImages.splice(randomIndex, 1);
                    setRandomPlace(); 
                    return;
                }
                placesBg.style.backgroundImage = `url('${imgUrl}')`;
                placesBg.style.opacity = '1';
            };
            tempImg.onerror = () => {
                placesImages.splice(randomIndex, 1);
                setRandomPlace(); 
            };
            tempImg.src = imgUrl;
        }

        btnStart.addEventListener('click', () => {
            splashScreen.classList.add('opacity-0');
            setTimeout(() => {
                splashScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                mainApp.classList.add('flex');
                updateUI();
            }, 700);
        });

        function showToast(msg) {
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.textContent = msg;
            toast.classList.remove('translate-y-20', 'opacity-0', 'bg-blue-600', 'bg-red-600', 'bg-emerald-600');
            
            if(msg.includes("limit") || msg.includes("full") || msg.includes("Boundary") || msg.includes("overflow")) {
                toast.classList.add('bg-red-600');
            } else {
                toast.classList.add('bg-blue-600');
            }
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 4000);
        }

        btnPlaces.addEventListener('click', () => {
            placesModeActive = !placesModeActive;
            if (placesModeActive) {
                placesBg.style.opacity = '0'; 
                setRandomPlace();
                placesBgContainer.classList.remove('opacity-0', 'pointer-events-none');
                placesControls.classList.remove('hidden');
                placesControls.classList.add('flex');
                btnPlaces.classList.add('text-blue-400');
                btnPlaces.classList.remove('text-neutral-400');
            } else {
                placesBgContainer.classList.add('opacity-0', 'pointer-events-none');
                placesControls.classList.add('hidden');
                placesControls.classList.remove('flex');
                btnPlaces.classList.remove('text-blue-400');
                btnPlaces.classList.add('text-neutral-400');
            }
        });

        btnPlacesShuffle.addEventListener('click', () => {
            placesBg.style.opacity = '0';
            setTimeout(() => { setRandomPlace(); }, 300);
        });
        focusSlider.addEventListener('input', (e) => { placesBg.style.filter = `blur(${e.target.value}px)`; });
        zoomSlider.addEventListener('input', (e) => { placesBg.style.transform = `scale(${e.target.value / 100})`; });

        let isReverting = false;

        function applyCommand(command, value = null) {
            document.execCommand(command, false, value);
            if (editor.scrollHeight > editor.clientHeight + 2 || editor.textContent.length > MAX_CHARS) {
                document.execCommand('undo');
                showToast("Formatting blocked: Text exceeds slide boundaries!");
            } else {
                saveContent();
            }
            editor.focus();
        }

        editor.addEventListener('paste', (e) => {
            e.preventDefault();
            let html = e.clipboardData.getData('text/html');
            let text = e.clipboardData.getData('text/plain');
            
            if (html) {
                html = html.replace(/&nbsp;/g, ' ').replace(/\u00A0/g, ' '); 
                let temp = document.createElement('div');
                temp.innerHTML = html;
                const elements = temp.querySelectorAll("*");
                elements.forEach(el => {
                    el.removeAttribute('style'); el.removeAttribute('class'); el.removeAttribute('id');
                    el.removeAttribute('width'); el.removeAttribute('height');
                });
                text = temp.textContent || temp.innerText || "";
            } else {
                text = text.replace(/\u00A0/g, ' ');
            }
            
            isReverting = true; 
            let currentLen = editor.textContent.length;
            let availableChars = MAX_CHARS - currentLen;
            
            if (availableChars <= 0) {
                showToast("Slide is full. Paste on the next slide.");
                isReverting = false; return;
            }

            let words = text.split(/(\s+)/); 
            let low = 0; let high = words.length; let bestFitIndex = 0;
            
            while (low <= high) {
                let mid = Math.floor((low + high) / 2);
                let attempt = words.slice(0, mid).join('');
                document.execCommand('insertText', false, attempt);
                
                if (editor.scrollHeight <= editor.clientHeight + 2 && editor.textContent.length <= MAX_CHARS) {
                    bestFitIndex = mid; low = mid + 1; 
                } else {
                    high = mid - 1; 
                }
                document.execCommand('undo');
            }
            
            let finalString = words.slice(0, bestFitIndex).join('');
            document.execCommand('insertText', false, finalString);
            isReverting = false;
            editor.dispatchEvent(new Event('input'));
            
            if (bestFitIndex < words.length) showToast(`Boundary hit! Copied ${finalString.length} chars. Paste remainder on next slide.`);
        });

        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' || e.key === 'Delete' || e.ctrlKey || e.metaKey || e.key.includes('Arrow')) return;
            if (editor.textContent.length >= MAX_CHARS) {
                e.preventDefault(); showToast(`${MAX_CHARS} Character limit reached.`); return;
            }
            if (editor.scrollHeight > editor.clientHeight + 2) {
                e.preventDefault(); showToast("Physical slide bottom reached.");
            }
        });

        editor.addEventListener('input', (e) => {
            if (isReverting) return; 
            if (editor.scrollHeight > editor.clientHeight + 2 || editor.textContent.length > MAX_CHARS) {
                isReverting = true; document.execCommand('undo'); 
                showToast("Slide capacity reached."); isReverting = false;
            } else {
                saveContent(); updateCharCount();
            }
        });

        function saveContent() { if (activePageIndex > 0) pages[activePageIndex] = editor.innerHTML; }

        fontMenuBtn.addEventListener('click', () => fontMenu.classList.toggle('hidden'));
        document.addEventListener('click', (e) => {
            if (!fontMenuBtn.contains(e.target) && !fontMenu.contains(e.target)) fontMenu.classList.add('hidden');
        });

        function applyFont(fontName) { applyCommand('fontName', fontName); fontMenu.classList.add('hidden'); }
        function applySize(size) { applyCommand('fontSize', size); }

        btnPrev.addEventListener('click', () => { if (activePageIndex > 0) { activePageIndex--; updateUI(); }});
        btnNext.addEventListener('click', () => { if (activePageIndex < pages.length - 1) { activePageIndex++; updateUI(); }});
        
        btnAdd.addEventListener('click', () => {
            if (pages.length >= MAX_PAGES) { showToast('Maximum of 20 slides reached!'); return; }
            pages.push(''); activePageIndex = pages.length - 1; updateUI();
        });

        btnDelete.addEventListener('click', () => {
            if (activePageIndex === 0) {
                coverImage = null; coverImagePreview.src = ''; coverImagePreview.classList.add('hidden');
                coverUploadLabel.classList.remove('opacity-0', 'hover:opacity-100');
                coverUploadLabel.classList.add('bg-neutral-900/80');
            } else {
                if (pages.length === 2) pages[1] = '';
                else { pages.splice(activePageIndex, 1); activePageIndex--; }
            }
            updateUI();
        });

        coverUploadInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    coverImage = reader.result; coverImagePreview.src = coverImage; coverImagePreview.classList.remove('hidden');
                    coverUploadLabel.classList.remove('bg-neutral-900/80'); coverUploadLabel.classList.add('opacity-0', 'hover:opacity-100');
                };
                reader.readAsDataURL(file);
            }
        });

        btnTheme.addEventListener('click', () => {
            theme = theme === 'dark' ? 'light' : 'dark';
            if (theme === 'light') {
                canvasContainer.classList.remove('bg-[#121212]', 'text-white'); canvasContainer.classList.add('bg-white', 'text-black');
            } else {
                canvasContainer.classList.remove('bg-white', 'text-black'); canvasContainer.classList.add('bg-[#121212]', 'text-white');
            }
        });

        function updateUI() {
            if (activePageIndex === 0) {
                pageIndicator.textContent = 'Cover Slide'; coverView.classList.remove('hidden'); textView.classList.add('hidden');
                toolbar.classList.add('hidden'); deleteText.textContent = 'Remove Cover';
                charCountDisplay.textContent = `0 / ${MAX_CHARS} Chars`;
                charCountDisplay.className = 'font-bold text-neutral-200 transition-colors';
            } else {
                pageIndicator.textContent = `Slide ${activePageIndex} of ${pages.length - 1}`;
                coverView.classList.add('hidden'); textView.classList.remove('hidden');
                toolbar.classList.remove('hidden'); toolbar.classList.add('flex');
                editor.innerHTML = pages[activePageIndex] || ''; deleteText.textContent = 'Clear Slide';
                updateCharCount();
            }
            btnPrev.disabled = activePageIndex === 0; btnNext.disabled = activePageIndex === pages.length - 1; btnAdd.disabled = pages.length >= MAX_PAGES;
        }

        function updateCharCount() {
            if (activePageIndex === 0) return;
            const textLen = editor.textContent.length;
            charCountDisplay.textContent = `${textLen} / ${MAX_CHARS} Chars`;
            charCountDisplay.className = textLen >= MAX_CHARS ? 'font-bold text-red-400 transition-colors' : 'font-bold text-neutral-200 transition-colors';
        }

        let isDraggingLever = false;
        let leverStartY = 0;
        let leverCurrentY = 0;
        const leverTrackLength = 170; // Physical pixel distance to pull

        btnExport.addEventListener('click', () => {
            leverModal.classList.remove('hidden');
            setTimeout(() => leverModal.classList.remove('opacity-0'), 10);
        });

        btnCancelPrint.addEventListener('click', () => {
            leverModal.classList.add('opacity-0');
            setTimeout(() => leverModal.classList.add('hidden'), 500);
        });

        const startDrag = (e) => {
            isDraggingLever = true;
            leverStartY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            leverHandle.style.transition = 'none';
        };

        const doDrag = (e) => {
            if(!isDraggingLever) return;
            const y = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            let delta = y - leverStartY;
            
            if (delta < 0) delta = 0;
            if (delta > leverTrackLength) delta = leverTrackLength;
            
            leverCurrentY = delta;
            leverHandle.style.transform = `translate(-50%, ${leverCurrentY}px)`;
            
            if (leverCurrentY >= leverTrackLength - 5) {
                // TRIGGER THE MACHINE
                isDraggingLever = false;
                leverModal.classList.add('opacity-0');
                setTimeout(() => leverModal.classList.add('hidden'), 500);
                leverHandle.style.transform = `translate(-50%, 0px)`; 
                startPrintingProcess();
            }
        };

        const endDrag = () => {
            if(!isDraggingLever) return;
            isDraggingLever = false;
            // Snap back animation
            leverHandle.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            leverHandle.style.transform = `translate(-50%, 0px)`;
        };

        leverHandle.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', doDrag);
        document.addEventListener('mouseup', endDrag);
        
        leverHandle.addEventListener('touchstart', startDrag, {passive: false});
        document.addEventListener('touchmove', doDrag, {passive: false});
        document.addEventListener('touchend', endDrag);

        async function startPrintingProcess() {
            showToast('The Printing Press is running...');
            btnExport.disabled = true; btnExport.classList.add('opacity-50');
            const zip = new JSZip(); 
            
            const visualCanvas = document.getElementById('canvas-container');
            const renderScale = 1080 / visualCanvas.clientWidth;
            
            const originalClasses = visualCanvas.className;
            const originalTransition = visualCanvas.style.transition;
            const originalPageIndex = activePageIndex;
            const originalEditorHtml = editor.innerHTML;
            
            visualCanvas.style.transition = 'none';
            visualCanvas.classList.remove('rounded-lg', 'border', 'border-neutral-800', 'shadow-2xl');
            
            // Turn on the machine shake
            mainApp.classList.add('animate-print-shake');

            try {
                for (let i = 0; i < pages.length; i++) {
                    if (i === 0) {
                        textView.classList.add('hidden');
                        coverView.classList.remove('hidden');
                    } else {
                        coverView.classList.add('hidden');
                        textView.classList.remove('hidden');
                        editor.innerHTML = pages[i] || '';
                    }

                    // Create the physical print head scanner
                    const scanner = document.createElement('div');
                    scanner.className = 'print-scanner';
                    visualCanvas.appendChild(scanner);

                    // Wait for the scanner to sweep down the page (800ms)
                    await new Promise(resolve => setTimeout(resolve, 800)); 
                    
                    // Briefly pause machine shake for a crystal clear HD photo
                    mainApp.classList.remove('animate-print-shake');
                    visualCanvas.removeChild(scanner);

                    const canvas = await html2canvas(visualCanvas, { 
                        scale: renderScale, 
                        useCORS: true, 
                        backgroundColor: theme === 'light' ? '#ffffff' : '#121212'
                    });
                    
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    zip.file(`${String(i + 1).padStart(2, '0')}_slide.png`, blob);
                    
                    // Resume machine shake for the next page
                    if(i < pages.length - 1) {
                        mainApp.classList.add('animate-print-shake');
                    }
                }

                const zipContent = await zip.generateAsync({ type: 'blob' });
                const link = document.createElement('a'); 
                link.href = URL.createObjectURL(zipContent);
                link.download = 'Wifey_Story.zip'; 
                link.click();
                showToast('Printing complete. Files downloaded.');
            } catch (error) {
                console.error("Export failed:", error); 
                showToast('Machine jammed. See console for details.');
            } finally {
                // Shut down the machine
                mainApp.classList.remove('animate-print-shake');
                visualCanvas.className = originalClasses;
                visualCanvas.style.transition = originalTransition;
                
                if (originalPageIndex === 0) {
                    textView.classList.add('hidden');
                    coverView.classList.remove('hidden');
                } else {
                    coverView.classList.add('hidden');
                    textView.classList.remove('hidden');
                }
                editor.innerHTML = originalEditorHtml;
                
                btnExport.disabled = false; 
                btnExport.classList.remove('opacity-50');
            }
        }

        const btnDictionary = document.getElementById('btn-dictionary');
        const dictionaryPanel = document.getElementById('dictionary-panel');
        const btnCloseDict = document.getElementById('btn-close-dict');
        const dictSearchInput = document.getElementById('dict-search-input');
        const dictResults = document.getElementById('dict-results');
        const btnHardcore = document.getElementById('btn-hardcore');

        btnHardcore.addEventListener('click', () => { showToast('⚡ Hardcore Mode is coming soon! Prepare yourself.'); });
        btnDictionary.addEventListener('click', () => { dictionaryPanel.classList.remove('translate-x-full'); setTimeout(() => dictSearchInput.focus(), 100); });
        btnCloseDict.addEventListener('click', () => { dictionaryPanel.classList.add('translate-x-full'); });

        dictSearchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { const word = dictSearchInput.value.trim(); if (word) fetchDefinition(word); }
        });

        async function fetchDefinition(word) {
            dictResults.innerHTML = `<div class="text-center text-neutral-400 mt-10"><i class="ph ph-spinner animate-spin text-4xl mb-3 text-blue-500"></i><p>Searching the archives...</p></div>`;
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                if (!response.ok) throw new Error('Word not found');
                const data = await response.json(); const entry = data[0];
                let html = `<div class="mb-2 border-b border-neutral-800 pb-4"><h3 class="text-3xl font-extrabold text-white tracking-tight">${entry.word}</h3>${entry.phonetic ? `<p class="text-blue-400 font-medium text-lg mt-1">${entry.phonetic}</p>` : ''}</div>`;
                
                entry.meanings.forEach(meaning => {
                    html += `<div class="mb-4"><div class="inline-block px-2 py-1 bg-neutral-800 text-xs font-bold uppercase tracking-wider text-neutral-300 rounded mb-3">${meaning.partOfSpeech}</div><ul class="list-disc pl-5 text-neutral-300 space-y-3">`;
                    meaning.definitions.slice(0, 4).forEach(def => {
                        html += `<li><span class="text-neutral-200">${def.definition}</span>`;
                        if (def.example) html += `<br><span class="text-neutral-500 italic text-sm mt-1 block">"${def.example}"</span>`;
                        html += `</li>`;
                    });
                    html += `</ul>`;
                    if (meaning.synonyms && meaning.synonyms.length > 0) {
                        html += `<div class="mt-4 text-sm bg-neutral-900 p-3 rounded-lg border border-neutral-800"><span class="text-neutral-500 font-medium">Synonyms: </span><span class="text-blue-400">${meaning.synonyms.slice(0, 6).join(', ')}</span></div>`;
                    }
                    html += `</div>`;
                });
                dictResults.innerHTML = html;
            } catch (error) {
                dictResults.innerHTML = `<div class="text-center text-neutral-500 mt-10"><i class="ph ph-warning-circle text-5xl mb-3 text-red-400 opacity-80"></i><p>We couldn't find a definition for "<span class="text-white">${word}</span>".</p><p class="text-sm mt-2 opacity-70">Check your spelling or try another word.</p></div>`;
            }
        }

        const btnWeather = document.getElementById('btn-weather');
        const weatherCanvas = document.getElementById('weather-canvas');
        const cloudsContainer = document.getElementById('clouds-container');
        const ctxWeather = weatherCanvas.getContext('2d');
        let weatherActive = false;
        let rainDrops = [];
        let rainAnimationId;

        function resizeWeatherCanvas() {
            weatherCanvas.width = window.innerWidth;
            weatherCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeWeatherCanvas);
        resizeWeatherCanvas(); 

        function createRain() {
            rainDrops = [];
            for (let i = 0; i < 150; i++) {
                rainDrops.push({
                    x: Math.random() * weatherCanvas.width,
                    y: Math.random() * weatherCanvas.height,
                    length: Math.random() * 20 + 10,
                    speed: Math.random() * 10 + 15,
                    opacity: Math.random() * 0.3 + 0.1,
                    angle: 0.1 
                });
            }
        }

        function animateRain() {
            ctxWeather.clearRect(0, 0, weatherCanvas.width, weatherCanvas.height);
            ctxWeather.lineWidth = 1.5;
            ctxWeather.lineCap = 'round';

            rainDrops.forEach(drop => {
                ctxWeather.beginPath();
                ctxWeather.moveTo(drop.x, drop.y);
                ctxWeather.lineTo(drop.x + (drop.angle * drop.length), drop.y + drop.length);
                ctxWeather.strokeStyle = `rgba(180, 210, 255, ${drop.opacity})`;
                ctxWeather.stroke();

                drop.y += drop.speed;
                drop.x += drop.angle * drop.speed;

                if (drop.y > weatherCanvas.height) {
                    drop.y = -drop.length;
                    drop.x = Math.random() * weatherCanvas.width;
                }
            });

            if (weatherActive) rainAnimationId = requestAnimationFrame(animateRain);
        }

        btnWeather.addEventListener('click', () => {
            weatherActive = !weatherActive;
            if (weatherActive) {
                btnWeather.classList.add('text-blue-400');
                btnWeather.classList.remove('text-neutral-400');
                weatherCanvas.classList.remove('opacity-0');
                cloudsContainer.classList.add('weather-active'); 
                createRain();
                animateRain();
            } else {
                btnWeather.classList.remove('text-blue-400');
                btnWeather.classList.add('text-neutral-400');
                weatherCanvas.classList.add('opacity-0');
                cloudsContainer.classList.remove('weather-active'); 
                setTimeout(() => { if (!weatherActive) cancelAnimationFrame(rainAnimationId); }, 1000);
            }
        });
    </script>
</body>
</html>
